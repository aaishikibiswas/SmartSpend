name: SmartSpend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/${{ github.repository }}.git

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        env:
          BACKEND_API_BASE: http://127.0.0.1:8001
          NEXT_PUBLIC_BACKEND_API_BASE: http://127.0.0.1:8001
          NEXT_PUBLIC_BACKEND_WS_BASE: ws://127.0.0.1:8001
          APP_URL: http://127.0.0.1:3001
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3001
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run backend smoke tests
        run: pytest backend/tests -q

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
    steps:
      - name: Skip deploy when EC2 secrets are not configured
        if: env.EC2_HOST == '' || env.EC2_USER == '' || env.EC2_SSH_KEY == ''
        run: echo "EC2 deployment secrets are not configured. Skipping deploy job."

      - name: Deploy over SSH
        if: env.EC2_HOST != '' && env.EC2_USER != '' && env.EC2_SSH_KEY != ''
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_URL: ${{ secrets.APP_URL }}
          FRONTEND_ORIGINS: ${{ secrets.FRONTEND_ORIGINS }}
          REPO_URL: ${{ env.REPO_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: APP_URL,FRONTEND_ORIGINS,REPO_URL
          script: |
            set -e
            sudo mkdir -p /opt/smartspend
            sudo chown -R $USER:$USER /opt/smartspend
            if [ ! -d /opt/smartspend/.git ]; then
              git clone "${REPO_URL}" /opt/smartspend
            else
              git -C /opt/smartspend fetch origin
              git -C /opt/smartspend reset --hard origin/main
            fi
            cd /opt/smartspend
            chmod +x scripts/deploy-ec2-native.sh
            APP_URL="${APP_URL}" FRONTEND_ORIGINS="${FRONTEND_ORIGINS}" bash scripts/deploy-ec2-native.sh
            curl --fail http://127.0.0.1/
            curl --fail http://127.0.0.1:8001/health
